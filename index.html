<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predizone Prototype</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 40px; text-align: center; }
        .match-card { background: white; padding: 20px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 40px; padding: 8px; font-size: 18px; text-align: center; margin: 0 10px; }
        button { background: #22c55e; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #16a34a; }
        #result-box { margin-top: 20px; font-weight: bold; font-size: 18px; color: #1e3a8a; }
    </style>
</head>
<body>

    <h1>🏆 Predizone Dashboard</h1>
    <p>Test your prediction scoring logic below!</p>

    <!-- Match Card -->
    <div class="match-card">
        <h3>Group A: Match 1</h3>
        <p><strong>Mexico vs. South Africa</strong></p>
        
        <!-- Inputs for User Prediction -->
        <input type="number" id="predHome" placeholder="0" min="0">
        <span>-</span>
        <input type="number" id="predAway" placeholder="0" min="0">
        
        <br>
        <button onclick="calculatePoints()">Submit Prediction</button>
        
        <div id="result-box"></div>
    </div>

    <script>
        // This is where our math logic will go next!
        function calculatePoints() {
            // Right now, it just says hello when clicked
            document.getElementById('result-box').innerText = "Prediction submitted! Let's write the scoring math next.";
        }
    </script>

</body>
</html>
