<!DOCTYPE html>
<html>

<head>

  <title>PrediZone</title>

  <style>

    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      margin-bottom: 40px;
      color: #00ff88;
    }

    #matches {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background-color: #222;
      width: 300px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,255,100,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      background-color: #00aa55;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #00cc66;
    }

    .saved {
      margin-top: 10px;
      color: #00ff88;
      font-size: 14px;
    }

  </style>

</head>

<body>

  <h1>⚽ PrediZone FIFA World Cup</h1>

  <div id="matches"></div>

  <script>

    const matches = [

      {
        id: 1,
        team1: "Team A",
        team2: "Team B"
      },

      {
        id: 2,
        team1: "Team C",
        team2: "Team D"
      },

      {
        id: 3,
        team1: "Team E",
        team2: "Team F"
      },

      {
        id: 4,
        team1: "Team G",
        team2: "Team H"
      }

    ];

    const matchesContainer =
      document.getElementById("matches");

    matches.forEach(match => {

      const savedPrediction =
        JSON.parse(localStorage.getItem(match.id));

      matchesContainer.innerHTML += `

        <div class="card">

          <h2>
            ${match.team1} vs ${match.team2}
          </h2>

          <input
            type="number"
            id="team1-${match.id}"
            placeholder="${match.team1} score"
            value="${savedPrediction ? savedPrediction.score1 : ""}"
          >

          <input
            type="number"
            id="team2-${match.id}"
            placeholder="${match.team2} score"
            value="${savedPrediction ? savedPrediction.score2 : ""}"
          >

          <button onclick="submitPrediction(${match.id})">
            Submit Prediction
          </button>

          <div
            class="saved"
            id="saved-${match.id}">
          </div>

        </div>

      `;

    });

    function submitPrediction(matchId) {

      const score1 =
        document.getElementById(
          `team1-${matchId}`
        ).value;

      const score2 =
        document.getElementById(
          `team2-${matchId}`
        ).value;

      const prediction = {
        score1,
        score2
      };

      localStorage.setItem(
        matchId,
        JSON.stringify(prediction)
      );

      document.getElementById(
        `saved-${matchId}`
      ).innerText =
        "✅ Prediction Saved";

    }

  </script>

</body>

</html>
