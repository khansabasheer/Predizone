<!DOCTYPE html>
<html>
<head>
  <title>PrediZone FIFA</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 { color: #00ff88; }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      background: #00aa55;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #00cc66; }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 280px;
    }

    #matches, #leaderboard {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>⚽ PrediZone FIFA</h1>

<!-- AUTH -->
<div id="auth">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<h2>Matches</h2>
<div id="matches"></div>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

/* 🔴 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ---------------- AUTH ---------------- */

window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = function () {
  signOut(auth);
};

/* ---------------- MATCHES ---------------- */

const matches = [
  { id: "m1", team1: "Brazil", team2: "Argentina" },
  { id: "m2", team1: "France", team2: "Germany" },
  { id: "m3", team1: "Spain", team2: "Portugal" }
];

function loadMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(m => {
    container.innerHTML += `
      <div class="card">
        <h3>${m.team1} vs ${m.team2}</h3>

        <input id="t1-${m.id}" placeholder="${m.team1}">
        <input id="t2-${m.id}" placeholder="${m.team2}">

        <button onclick="savePrediction('${m.id}')">
          Submit
        </button>

        <div id="saved-${m.id}"></div>
      </div>
    `;
  });
}

/* ---------------- SAVE PREDICTION ---------------- */

window.savePrediction = async function (matchId) {
  const user = auth.currentUser;
  if (!user) return alert("Login first!");

  const s1 = document.getElementById(`t1-${matchId}`).value;
  const s2 = document.getElementById(`t2-${matchId}`).value;

  if (s1 === "" || s2 === "") {
    alert("Enter scores!");
    return;
  }

  await setDoc(doc(db, "predictions", user.uid + "_" + matchId), {
    userId: user.uid,
    matchId,
    score1: Number(s1),
    score2: Number(s2)
  });

  document.getElementById(`saved-${matchId}`).innerText =
    "✅ Prediction Saved";
};

/* ---------------- LEADERBOARD ---------------- */

async function loadLeaderboard() {
  const snap = await getDocs(collection(db, "predictions"));

  const points = {};

  snap.forEach(docSnap => {
    const p = docSnap.data();

    if (!points[p.userId]) points[p.userId] = 0;

    // SIMPLE DEMO SCORING RULE
    if (p.score1 === 2 && p.score2 === 1) {
      points[p.userId] += 3;
    }
  });

  let html = "";

  Object.entries(points).forEach(([user, score]) => {
    html += `<p>${user}: ${score} pts</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

/* ---------------- AUTH STATE ---------------- */

onAuthStateChanged(auth, user => {
  if (user) {
    loadMatches();
    loadLeaderboard();
  }
});

</script>

</body>
</html>
