<!DOCTYPE html>
<html>
<head>
  <title>PrediZone Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #22c55e;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      width: 120px;
    }

    button {
      padding: 8px 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .admin {
      border: 2px solid #22c55e;
      padding: 10px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .match-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .leaderboard-item {
      padding: 8px;
      background: #111827;
      margin: 5px 0;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>⚽ PrediZone Pro FIFA Predictor</header>

<div class="container">

  <!-- LEFT: MATCHES -->
  <div>

    <h2>Matches</h2>
    <div id="matches"></div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="admin" style="display:none;">
      <h3>🧑‍💻 Admin Panel</h3>

      <input id="team1" placeholder="Team 1">
      <input id="team2" placeholder="Team 2">
      <button onclick="addMatch()">Add Match</button>

      <h4>Set Results</h4>
      <div id="adminMatches"></div>
    </div>

  </div>

  <!-- RIGHT: LEADERBOARD -->
  <div>
    <h2>🏆 Leaderboard</h2>
    <div id="leaderboard"></div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

/* ✅ ONLY ONE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAwflETP5PbdzrCqwTtS66lNv2mHq6C31c",
  authDomain: "predizone-cc184.firebaseapp.com",
  projectId: "predizone-cc184",
  storageBucket: "predizone-cc184.firebasestorage.app",
  messagingSenderId: "936075401384",
  appId: "1:936075401384:web:f4fff3da365ab6e8068a9d"
};

/* INIT ONLY ONCE */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "youradmin@gmail.com";

/* ---------------- LOAD MATCHES ---------------- */

async function loadMatches() {
  const snap = await getDocs(collection(db, "matches"));

  let html = "";
  let adminHtml = "";

  snap.forEach(m => {
    const data = m.data();

    html += `
      <div class="card">
        <div class="match-title">${data.team1} vs ${data.team2}</div>

        <input id="p1-${m.id}" placeholder="Score 1">
        <input id="p2-${m.id}" placeholder="Score 2">

        <button onclick="savePrediction('${m.id}')">Predict</button>
      </div>
    `;

    adminHtml += `
      <div class="card">
        <div class="match-title">${data.team1} vs ${data.team2}</div>

        <input id="r1-${m.id}" placeholder="Score 1">
        <input id="r2-${m.id}" placeholder="Score 2">

        <button onclick="setResult('${m.id}')">Set Result</button>
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
  document.getElementById("adminMatches").innerHTML = adminHtml;
}

/* ---------------- ADD MATCH ---------------- */

window.addMatch = async function () {
  const id = Date.now().toString();

  await setDoc(doc(db, "matches", id), {
    team1: team1.value,
    team2: team2.value,
    score1: null,
    score2: null
  });

  team1.value = "";
  team2.value = "";
};

/* ---------------- SAVE PREDICTION ---------------- */

window.savePrediction = async function (id) {
  const user = auth.currentUser;
  if (!user) return alert("Login first!");

  await setDoc(doc(db, "predictions", user.uid + "_" + id), {
    userId: user.uid,
    matchId: id,
    score1: Number(document.getElementById(`p1-${id}`).value),
    score2: Number(document.getElementById(`p2-${id}`).value)
  });

  alert("Saved!");
};

/* ---------------- RESULT ---------------- */

window.setResult = async function (id) {
  const user = auth.currentUser;
  if (!user || user.email !== ADMIN_EMAIL) {
    return alert("Admin only!");
  }

  await updateDoc(doc(db, "matches", id), {
    score1: Number(document.getElementById(`r1-${id}`).value),
    score2: Number(document.getElementById(`r2-${id}`).value)
  });

  calculateLeaderboard();
};

/* ---------------- SCORING ---------------- */

function calculatePoints(pred, real) {
  if (real.score1 == null) return 0;

  if (pred.score1 == real.score1 && pred.score2 == real.score2) return 3;

  const pr = Math.sign(pred.score1 - pred.score2);
  const rr = Math.sign(real.score1 - real.score2);

  return pr === rr ? 1 : 0;
}

/* ---------------- LEADERBOARD ---------------- */

async function calculateLeaderboard() {
  const predSnap = await getDocs(collection(db, "predictions"));
  const matchSnap = await getDocs(collection(db, "matches"));

  const matches = {};
  matchSnap.forEach(m => matches[m.id] = m.data());

  const points = {};

  predSnap.forEach(p => {
    const d = p.data();

    if (!points[d.userId]) points[d.userId] = 0;

    points[d.userId] += calculatePoints(d, matches[d.matchId]);
  });

  document.getElementById("leaderboard").innerHTML =
    Object.entries(points)
      .sort((a,b)=>b[1]-a[1])
      .map(x => `<div class="leaderboard-item">${x[0]} - ${x[1]} pts</div>`)
      .join("");
}

/* ---------------- LIVE ---------------- */

function startLive() {
  onSnapshot(collection(db, "matches"), () => {
    loadMatches();
    calculateLeaderboard();
  });

  onSnapshot(collection(db, "predictions"), () => {
    calculateLeaderboard();
  });
}

/* ---------------- AUTH ---------------- */

onAuthStateChanged(auth, user => {
  if (user) {
    loadMatches();
    calculateLeaderboard();
    startLive();

    if (user.email === ADMIN_EMAIL) {
      document.getElementById("adminPanel").style.display = "block";
    }
  }
});

</script>
  
</body>
</html>
