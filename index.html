<!DOCTYPE html>
<html>
<head>
  <title>PrediZone FIFA Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 { color: #00ff88; }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      background: #00aa55;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #00cc66; }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 280px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #00ff88;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>⚽ PrediZone FIFA</h1>

<!-- AUTH -->
<div>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<hr>

<h2>Matches</h2>
<div id="matches"></div>

<h2 id="leaderboardTitle">🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h2>🧑‍💻 Admin Panel</h2>

  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">

  <button onclick="addMatch()">Add Match</button>

  <h3>Manage Matches</h3>
  <div id="adminMatches"></div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  deleteDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

/* 🔴 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔐 ADMIN EMAIL */
const ADMIN_EMAIL = "youradmin@gmail.com";

/* ---------------- AUTH ---------------- */

window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

window.logout = function () {
  signOut(auth);
};

/* ---------------- MATCHES ---------------- */

async function loadMatches() {
  const snap = await getDocs(collection(db, "matches"));

  const container = document.getElementById("matches");
  const adminContainer = document.getElementById("adminMatches");

  container.innerHTML = "";
  adminContainer.innerHTML = "";

  snap.forEach(d => {
    const m = d.data();

    // USER VIEW
    container.innerHTML += `
      <div class="card">
        <h3>${m.team1} vs ${m.team2}</h3>

        <input id="t1-${d.id}" placeholder="${m.team1}">
        <input id="t2-${d.id}" placeholder="${m.team2}">

        <button onclick="savePrediction('${d.id}')">
          Submit
        </button>
      </div>
    `;

    // ADMIN VIEW
    adminContainer.innerHTML += `
      <div class="card">
        <h3>${m.team1} vs ${m.team2}</h3>
        <button onclick="deleteMatch('${d.id}')">❌ Delete</button>
      </div>
    `;
  });
}

/* ---------------- ADD MATCH ---------------- */

window.addMatch = async function () {
  const user = auth.currentUser;

  if (!user || user.email !== ADMIN_EMAIL) {
    return alert("Admin only!");
  }

  const id = Date.now().toString();

  await setDoc(doc(db, "matches", id), {
    team1: team1.value,
    team2: team2.value
  });

  team1.value = "";
  team2.value = "";

  loadMatches();
};

/* ---------------- DELETE MATCH ---------------- */

window.deleteMatch = async function (id) {
  const user = auth.currentUser;

  if (!user || user.email !== ADMIN_EMAIL) {
    return alert("Admin only!");
  }

  await deleteDoc(doc(db, "matches", id));
  loadMatches();
};

/* ---------------- SAVE PREDICTION ---------------- */

window.savePrediction = async function (matchId) {
  const user = auth.currentUser;
  if (!user) return alert("Login first!");

  const s1 = document.getElementById(`t1-${matchId}`).value;
  const s2 = document.getElementById(`t2-${matchId}`).value;

  await setDoc(doc(db, "predictions", user.uid + "_" + matchId), {
    userId: user.uid,
    matchId,
    score1: Number(s1),
    score2: Number(s2)
  });

  alert("Prediction saved!");
};

/* ---------------- LIVE LEADERBOARD ---------------- */

function startLiveLeaderboard() {

  const ref = collection(db, "predictions");

  onSnapshot(ref, (snapshot) => {

    const points = {};

    snapshot.forEach(docSnap => {
      const p = docSnap.data();

      if (!points[p.userId]) points[p.userId] = 0;

      // demo scoring logic
      if (p.score1 === 2 && p.score2 === 1) {
        points[p.userId] += 3;
      }
    });

    const sorted = Object.entries(points)
      .sort((a, b) => b[1] - a[1]);

    let html = "";

    sorted.forEach(([user, score]) => {
      html += `<p>${user} — ${score} pts</p>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
  });
}

/* ---------------- AUTH STATE ---------------- */

onAuthStateChanged(auth, user => {

  if (user) {
    loadMatches();
    startLiveLeaderboard();

    if (user.email === ADMIN_EMAIL) {
      document.getElementById("adminPanel").style.display = "block";
    }
  }
});

</script>

</body>
</html>
