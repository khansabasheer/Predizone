<!DOCTYPE html>
<html>

<head>

  <title>PrediZone</title>

  <style>

    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 40px;
    }

    h1 {
      margin-bottom: 40px;
    }

    #matches {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #222;
      width: 300px;
      padding: 20px;
      border-radius: 10px;
    }

    .card:hover {
      transform: scale(1.03);
      transition: 0.3s;
    }

    input {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>⚽ PrediZone FIFA World Cup</h1>

  <div id="matches"></div>

  <script>

    const matches = [

      {
        team1: "Team A",
        team2: "Team B"
      },

      {
        team1: "Team C",
        team2: "Team D"
      },

      {
        team1: "Team E",
        team2: "Team F"
      }

    ];

    const matchesContainer =
      document.getElementById("matches");

    matches.forEach(match => {

      matchesContainer.innerHTML += `

        <div class="card">

          <h2>
            ${match.team1} vs ${match.team2}
          </h2>

          <input
            type="number"
            placeholder="${match.team1} score"
          >

          <input
            type="number"
            placeholder="${match.team2} score"
          >

          <button onclick="submitPrediction()">
            Submit Prediction
          </button>

        </div>

      `;

    });

    function submitPrediction() {

      alert("Prediction Submitted!");

    }

  </script>

</body>

</html>
