<!DOCTYPE html>
<html>

<head>
  <title>PrediZone</title>

  <style>

    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
    }

    .card {
      background: #222;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>⚽ PrediZone</h1>

  <div class="card">

    <h2>Argentina vs Brazil</h2>

    <input type="number" placeholder="Argentina score">

    <input type="number" placeholder="Brazil score">

    <button>
      Submit Prediction
    </button>

  </div>

</body>

</html>
